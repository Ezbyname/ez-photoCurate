name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0.0
  workflow_dispatch:   # Manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        run: python build_exe.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: EzPhotoOrganizer-Windows
          path: dist/E-z Photo Organizer/
          retention-days: 90

  build-macos-intel:
    runs-on: macos-13    # Intel Mac
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          brew install cmake

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Mac app
        run: python build_mac.py

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: EzPhotoOrganizer-Mac-Intel
          path: dist/E-z Photo Organizer.app/
          retention-days: 90

  build-macos-arm:
    runs-on: macos-14    # Apple Silicon (M1+)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          brew install cmake

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Mac app
        run: python build_mac.py

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: EzPhotoOrganizer-Mac-AppleSilicon
          path: dist/E-z Photo Organizer.app/
          retention-days: 90

  release:
    needs: [build-windows, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Zip artifacts
        run: |
          cd EzPhotoOrganizer-Windows && zip -r ../EzPhotoOrganizer-Windows.zip . && cd ..
          cd EzPhotoOrganizer-Mac-Intel && zip -r ../EzPhotoOrganizer-Mac-Intel.zip . && cd ..
          cd EzPhotoOrganizer-Mac-AppleSilicon && zip -r ../EzPhotoOrganizer-Mac-AppleSilicon.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EzPhotoOrganizer-Windows.zip
            EzPhotoOrganizer-Mac-Intel.zip
            EzPhotoOrganizer-Mac-AppleSilicon.zip
          generate_release_notes: true
